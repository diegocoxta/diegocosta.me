on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  dependency_updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - uses: josStorer/get-current-time@v2
        id: current-time
        with:
          format: YYYYMMDD
          timezone: 'America/Sao_Paulo'
      - id: outdated_dependencies
        run: |
          set +e
          echo "OUTDATED_DEPENDENCIES<<EOF" >> $GITHUB_ENV
          yarn outdated --json | npx yarn-outdated-formatter >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          set -e
      - run: yarn upgrade --latest
      - uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(dependencies): ${{ steps.current-time.outputs.readableTime }} - keeping dependencies updated to the latest version automatically'
          branch: dependency_updates
          delete-branch: true
          title: 'chore(dependencies): Keeping dependencies updated to the latest version automatically'
          base: main
          body: ${{ env.OUTDATED_DEPENDENCIES }}
          reviewers: diegocoxta
          assignees: diegocoxta
